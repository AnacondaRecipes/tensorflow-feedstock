gpu_variant:
  - None
  - cuda                       # [linux]
  - cuda                       # [linux]

cuda_compiler_version:
  - None                       
  - 12.9                       # [linux]
  - 13.0                       # [linux]

zip_keys:                      # [linux]
  -                            # [linux]
    - gpu_variant              # [linux]
    - cuda_compiler_version    # [linux]

skip_cuda_pbp:
  - false

OSX_SDK_VER:               # [osx]
  - 12.3                   # [osx]

c_compiler:                # [win]
  - clang                  # [win]
cxx_compiler:              # [win]
  - clang                  # [win]

c_compiler_version:
  # NVCC + GCC 14 on linux-aarch64 trips in arm_neon.h builtins.
  # Use GCC 11 (available in pkgs/main) for stable CUDA host compilation.
  - 11                     # [linux and aarch64]
  - 21                     # [win]
cxx_compiler_version:
  - 11                     # [linux and aarch64]
  - 21                     # [win]
